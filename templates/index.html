<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stock Research</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            max-width: 640px;
            margin: 80px auto;
            padding: 20px;
            color: #1a1a1a;
        }
        h1 { font-size: 28px; margin-bottom: 8px; }
        p.subtitle { color: #666; margin-top: 0; }
        form { margin: 30px 0; display: flex; gap: 8px; }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            background: #0070f3;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover { background: #0058c4; }
        .error {
            color: #b00020;
            background: #fde7ea;
            padding: 12px;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <h1>Stock Research</h1>
    <p class="subtitle">Enter a ticker symbol to get a plain-English breakdown.</p>
    <form action="/stock" method="get">
        <input type="text" name="ticker" placeholder="e.g. AAPL, MSFT, TSLA" required autofocus>
        <button type="submit">Search</button>
    </form>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
</body>
</html>
