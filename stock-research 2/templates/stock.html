<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ company.symbol }} — Stock Research</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            max-width: 820px;
            margin: 40px auto;
            padding: 20px;
            color: #1a1a1a;
        }
        a { color: #0070f3; text-decoration: none; }
        a:hover { text-decoration: underline; }
        h1 { font-size: 28px; margin-bottom: 4px; }
        .symbol { color: #666; font-weight: normal; }
        .stats { display: flex; gap: 16px; flex-wrap: wrap; margin: 24px 0; }
        .stat {
            background: #f5f5f7;
            padding: 16px 20px;
            border-radius: 8px;
            min-width: 140px;
        }
        .stat-label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-size: 20px; font-weight: 600; margin-top: 4px; }
        .description { line-height: 1.65; margin: 20px 0; color: #333; }
        h2 { font-size: 18px; margin-top: 32px; }
    </style>
</head>
<body>
    <a href="/">&larr; Search again</a>
    <h1>
        {{ company.companyName }}
        <span class="symbol">({{ company.symbol }})</span>
    </h1>
    <div class="stats">
        <div class="stat">
            <div class="stat-label">Price</div>
            <div class="stat-value">${{ "%.2f"|format(company.price) }}</div>
        </div>
        <div class="stat">
            <div class="stat-label">Market Cap</div>
            <div class="stat-value">${{ "{:,.0f}".format(company.mktCap) }}</div>
        </div>
        <div class="stat">
            <div class="stat-label">Sector</div>
            <div class="stat-value">{{ company.sector or "—" }}</div>
        </div>
        <div class="stat">
            <div class="stat-label">Industry</div>
            <div class="stat-value">{{ company.industry or "—" }}</div>
        </div>
    </div>
    <h2>About</h2>
    <p class="description">{{ company.description }}</p>
</body>
</html>
